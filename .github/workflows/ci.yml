name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: takehome
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/takehome
      LLM_BASE_URL: http://localhost:11434

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Start mock LLM
        run: |
          cd mock-llm
          bun install
          nohup bun run server.ts >../mock-llm.log 2>&1 &
          echo $! > ../mock-llm.pid
          cd ..
          for i in $(seq 1 30); do
            if curl -fs http://localhost:11434/health >/dev/null; then
              echo "mock-llm is ready"
              exit 0
            fi
            sleep 1
          done
          echo "mock-llm failed to start within 30s" >&2
          cat mock-llm.log >&2
          exit 1

      - name: Run migrations
        run: bun run db:migrate

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # Tests fail by design on the template repo because the API routes are
      # 501 stubs awaiting candidate implementation. Candidates' forks run the
      # full suite — only the template itself is skipped.
      - name: Run tests
        if: ${{ github.repository != 'blencorp/blen-fullstack-engineer-ii-take-home' }}
        run: bun run test
